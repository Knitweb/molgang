# Minimal Prometheus config to scrape a molgang node and load the SLO alerts.
# Point `targets` at a running `molgang serve` (default port 8765).
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - alerts.yml

scrape_configs:
  - job_name: molgang
    metrics_path: /metrics
    static_configs:
      - targets: ["127.0.0.1:8765"]
