# Local Prometheus + Grafana for MOLGANG (#123): `docker compose up` and open
# http://localhost:3000 (anonymous viewer) — the MOLGANG board is provisioned,
# no manual clicks. Prometheus scrapes a local `molgang serve` on :8765.
services:
  prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./molgang-alerts.yml:/etc/prometheus/molgang-alerts.yml:ro
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Linux: reach the host's molgang serve

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_SECURITY_ADMIN_PASSWORD: "molgang"   # local-only stack; change for anything shared
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
