name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch knitweb (the protocol MOLGANG runs on)
        run: git clone --depth 1 https://github.com/knitweb/pulse.git ../pulse
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ../pulse -e . "pytest>=8"
      - name: Check knitweb engine compatibility
        run: PYTHONPATH=src:../pulse/src python -m molgang.cli doctor
      - name: Tests
        run: PYTHONPATH=.:src:../pulse/src python -m pytest -q
      - name: Django wrapper tests
        run: |
          python -m pip install -r molgang_web/requirements.txt
          PYTHONPATH=src:../pulse/src python molgang_web/manage.py test bar
      - name: Demos + bridge run green
        run: |
          PYTHONPATH=src:../pulse/src python examples/play_demo.py
          PYTHONPATH=src:../pulse/src python examples/p2p_demo.py
          PYTHONPATH=.:src:../pulse/src python bridge/ingest.py bridge/sample_roblox_votes.json
          PYTHONPATH=src:../pulse/src python -m molgang.cli demo

      - name: Run browser e2e (Playwright + Selenium)
        run: |
          python -m pip install playwright selenium
          python -m playwright install --with-deps chromium
          PYTHONPATH=src:../pulse/src python tests/e2e/molgang_e2e.py --port 8799
        continue-on-error: false

      - name: Upload e2e screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots-failure
          path: .artifacts/e2e/
          retention-days: 7

      - name: Upload e2e screenshots on success
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots-success
          path: .artifacts/e2e/
          retention-days: 3
