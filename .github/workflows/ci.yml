name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch knitweb (the protocol MOLGANG runs on)
        run: git clone --depth 1 https://github.com/knitweb/pulse.git ../pulse
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ../pulse -e . "pytest>=8" pyyaml
      - name: Check knitweb engine compatibility
        run: PYTHONPATH=src:../pulse/src python -m molgang.cli doctor
      - name: Tests
        run: PYTHONPATH=.:src:../pulse/src python -m pytest -q
      - name: Mesh convergence scale proof (#100)
        # -s so the "MESH SCALE: …" measurement line lands in the CI log — the bounded
        # road-to-1M trend number (writers × items, reconcile rounds, convergence time).
        run: PYTHONPATH=.:src:../pulse/src python -m pytest -q -s tests/test_relay_sync.py -k mesh
      - name: Django wrapper tests
        run: |
          python -m pip install -r molgang_web/requirements.txt
          PYTHONPATH=src:../pulse/src python molgang_web/manage.py test bar
      - name: Demos + bridge run green
        run: |
          PYTHONPATH=src:../pulse/src python examples/play_demo.py
          PYTHONPATH=src:../pulse/src python examples/p2p_demo.py
          PYTHONPATH=.:src:../pulse/src python bridge/ingest.py bridge/sample_roblox_votes.json
          PYTHONPATH=src:../pulse/src python -m molgang.cli demo

      - name: Run browser e2e
        run: |
          python -m pip install playwright
          python -m playwright install --with-deps chromium
          PYTHONPATH=src:../pulse/src python tests/e2e/molgang_e2e.py --suite all

  load-ramp:
    # #122: non-blocking small ramp — publishes the per-step p50/p95/p99 + woven-rate
    # report as an artifact; failures never gate the merge (trend signal, not a gate).
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch knitweb (the protocol MOLGANG runs on)
        run: git clone --depth 1 https://github.com/knitweb/pulse.git ../pulse
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ../pulse -e .
      - name: Ramp 25,50
        run: PYTHONPATH=src:../pulse/src python tests/load/ramp.py --steps 25,50 --report .artifacts/load/ramp.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-ramp-report
          path: .artifacts/load/
